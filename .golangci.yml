version: "2"
run:
  issues-exit-code: 0
  tests: true
output:
  formats:
    text:
      path: stderr
      print-linter-name: true
      print-issued-lines: true
    checkstyle:
      path: linters-report.xml
  sort-order:
    - linter
    - severity
    - file
  path-prefix: ""
linters:
  default: none
  enable:
    - bodyclose
    - copyloopvar
    - depguard
    - dogsled
    - dupl
    - errcheck
    - funlen
    - gochecknoinits
    - goconst
    - gocritic
    - gocyclo
    - goprintffuncname
    - gosec
    - govet
    - ineffassign
    - lll
    - misspell
    - mnd
    - nakedret
    - noctx
    - nolintlint
    - revive
    - rowserrcheck
    - staticcheck
    - unconvert
    - unparam
    - unused
    - whitespace
    - wsl_v5
  settings:
    depguard:
      rules:
        logger:
          deny:
            - pkg: github.com/sirupsen/logrus
              desc: logging is allowed only by github.com/obalunenko/logger
    dupl:
      threshold: 100
    funlen:
      lines: 100
      statements: 50
    goconst:
      min-len: 2
      min-occurrences: 2
    gocritic:
      disabled-checks:
        - dupImport
        - ifElseChain
        - hugeParam
        - octalLiteral
        - wrapperFunc
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
    gocyclo:
      min-complexity: 15
    govet:
      enable:
        - appends
        - asmdecl
        - assign
        - atomic
        - atomicalign
        - bools
        - buildtag
        - cgocall
        - composites
        - copylocks
        - deepequalerrors
        - defers
        - directive
        - errorsas
        - findcall
        - framepointer
        - httpresponse
        - ifaceassert
        - loopclosure
        - lostcancel
        - nilfunc
        - nilness
        - printf
        - reflectvaluecompare
        - shadow
        - shift
        - sigchanyzer
        - slog
        - sortslice
        - stdmethods
        - stringintconv
        - structtag
        - testinggoroutine
        - tests
        - timeformat
        - unmarshal
        - unreachable
        - unsafeptr
        - unusedresult
        - unusedwrite
      disable:
        - fieldalignment
      disable-all: false
    lll:
      line-length: 140
    misspell:
      locale: US
    mnd:
      checks:
        - argument
        - case
        - condition
        - operation
        - return
        - assign
    nolintlint:
      require-explanation: false
      require-specific: false
      allow-unused: false
    wsl_v5:
      allow-first-in-block: true
      allow-whole-block: false
      branch-max-lines: 2
  exclusions:
    generated: lax
    rules:
      - linters:
          - dupl
          - funlen
          - gocyclo
          - gosec
        path: _test\.go
      - path: (.+)\.go$
        text: exported func * returns unexported type *, which can be annoying to use
      - path: (.+)\.go$
        text: should have a package comment, unless it's in another file for this package
    paths:
      - \.pb\.go$
      - vendor/
      - third_party$
      - builtin$
      - examples$
issues:
  uniq-by-line: true
  new: false
  fix: false
severity:
  default: error
  rules:
    - linters:
        - dupl
      severity: info
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/obalunenko)
        - localmodule
      custom-order: true
      no-lex-order: true
    goimports:
      local-prefixes:
        - github.com/obalunenko/getenv
  exclusions:
    generated: lax
    paths:
      - \.pb\.go$
      - vendor/
      - third_party$
      - builtin$
      - examples$
